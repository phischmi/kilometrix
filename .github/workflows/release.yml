name: Release-Binaries

# Release per "Run workflow" mit tag-Input: baut die Backend-Binaries
# (Cross-Compile vom Linux-Runner) und hängt sie an ein GitHub-Release. Das Tag
# legt action-gh-release serverseitig an (der Git-Proxy erlaubt keine Tag-Pushes),
# daher kein push-tags-Trigger.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release-Tag (z. B. v2.0.0). Leer lassen = nur Artefakte bauen, kein Release."
        required: false
        default: ""

permissions:
  contents: write   # für das Erstellen/Befüllen des Release

env:
  GO_VERSION: "1.23"

jobs:
  # Cross-Compile vom Linux-Runner für alle Zielplattformen (CGO_ENABLED=0).
  backend:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: windows, goarch: amd64, ext: ".exe" }
          - { goos: darwin,  goarch: arm64, ext: "" }
          - { goos: darwin,  goarch: amd64, ext: "" }
          - { goos: linux,   goarch: amd64, ext: "" }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          out="kilometrix-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          go build -ldflags="-s -w" -o "$out" ./cmd/kilometrix
          echo "ARTIFACT=$out" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: kilometrix-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.ARTIFACT }}
          if-no-files-found: error

  # Release: nur wenn ein tag-Input gesetzt ist — sammelt die Artefakte und
  # legt Tag + Release serverseitig an.
  release:
    if: inputs.tag != ''
    needs: [backend]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: dist/**/*
          fail_on_unmatched_files: true
          generate_release_notes: true
