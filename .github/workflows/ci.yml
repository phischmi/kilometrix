name: CI — Backend-Binaries

on:
  push:
    branches: ["main", "claude/**", "feature/**"]
    paths:
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - ".github/workflows/ci.yml"

env:
  GO_VERSION: "1.23"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: windows, goarch: amd64, ext: ".exe", name: windows-amd64 }
          - { goos: darwin,  goarch: arm64, ext: "",     name: macos-arm64 }
          - { goos: linux,   goarch: amd64, ext: "",     name: linux-amd64 }

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Test
        if: matrix.goos == 'linux'
        run: go test ./...

      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags="-s -w" \
            -o "kilometrix-${{ matrix.name }}${{ matrix.ext }}" \
            ./cmd/kilometrix

      - uses: actions/upload-artifact@v4
        with:
          name: kilometrix-${{ matrix.name }}
          path: kilometrix-${{ matrix.name }}${{ matrix.ext }}
          retention-days: 30
          if-no-files-found: error
