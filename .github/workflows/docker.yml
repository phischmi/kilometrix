name: Build & Push Docker image

on:
  push:
    branches: [main]
    # Nur bauen, wenn das Backend-Image tatsächlich betroffen ist.
    paths:
      - "Dockerfile"
      - "go.mod"
      - "cmd/**"
      - "internal/**"
      - "addin/**"
      - ".github/workflows/docker.yml"
    tags:
      - "v*"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository }}   # ghcr.io/phischmi/kilometrix

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags/labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            # latest bei jedem Merge auf main
            type=raw,value=latest,enable={{is_default_branch}}
            # Semver-Tags bei v*-Releases: v2.0.1 → 2.0.1 + 2.0 + 2
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Alte Image-Versionen aufräumen
        uses: actions/delete-package-versions@v5
        with:
          package-name: kilometrix
          package-type: container
          # Die 3 neuesten Versionen behalten (latest + 2 ältere als Fallback).
          min-versions-to-keep: 3
          # Auch sha-* und andere benannte Tags löschen, nicht nur Untagged.
          delete-only-untagged-versions: false
          # Versionen mit diesen Tags NIE löschen.
          ignore-versions: "^(latest|\\d+\\.\\d+\\.\\d+|\\d+\\.\\d+)$"
