name: Build & Push Docker image

on:
  push:
    branches: [main]
    # Nur bauen, wenn das Backend-Image tatsächlich betroffen ist
    # (Dockerfile + alles, was hineinkopiert wird). Reine GUI-/Docs-
    # Änderungen lösen keinen Image-Build mehr aus.
    paths:
      - "Dockerfile"
      - "go.mod"
      - "cmd/**"
      - "internal/**"
      - "addin/**"
      - ".github/workflows/docker.yml"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository }}   # ghcr.io/phischmi/kilometrix

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags/labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # NAS ist amd64; bei ARM-NAS hier linux/amd64,linux/arm64 setzen (braucht QEMU-Step).
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
